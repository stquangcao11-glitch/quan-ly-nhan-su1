<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhân Sự Seentech</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 20px; }
        .logo { display: block; margin: 0 auto 10px; max-width: 120px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 15px; font-size: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; background: #1a73e8; color: #fff; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .dynamic-field { display: none; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 12px; }
        .dynamic-field.active { display: block; }
        
        /* CSS cho phần tra cứu */
        .status-box { background: #e8f0fe; border-top: 4px solid #1a73e8; }
        #statusResult { text-align: center; font-size: 18px; font-weight: bold; color: #1a73e8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <img src="logo.png" alt="Seentech Logo" class="logo">
    <h2>Gửi Yêu Cầu</h2>
    <form id="hrForm">
        <label>Họ và Tên</label>
        <select id="fullName" required>
            <option value="">-- Chọn tên --</option>
            <option>Đào Trang</option><option>Trần Trang</option><option>Anh Dũng</option>
            <option>Huy Đạt</option><option>Thảo Nguyên</option><option>Ngọc Vân</option>
            <option>Thùy Chi</option><option>Anh Thư</option><option>Huyền Trang</option>
            <option>Đức Duy</option><option>Roze Ngọc</option><option>Thúy Quỳnh</option>
            <option>Thu Vân</option><option>Thanh Tâm</option>
        </select>

        <label>Loại yêu cầu</label>
        <select id="requestType" required onchange="toggleFields()">
            <option value="">-- Chọn loại --</option>
            <option value="Xin nghỉ phép (1 ngày)">Nghỉ phép (1 ngày)</option>
            <option value="Xin nghỉ phép (nhiều ngày)">Nghỉ phép (nhiều ngày)</option>
            <option value="Xin đi muộn">Đi muộn</option>
            <option value="Xin về sớm">Về sớm</option>
            <option value="Xin làm online">Làm online</option>
        </select>

        <label id="dateLabel">Ngày áp dụng</label>
        <input type="date" id="date" required>

        <div id="endDateGroup" class="dynamic-field">
            <label>Đến ngày</label>
            <input type="date" id="endDate">
        </div>

        <div id="sessionGroup" class="dynamic-field">
            <label>Thời gian áp dụng</label>
            <select id="sessionOption">
                <option value="Cả ngày">Cả ngày</option><option value="Sáng">Sáng</option><option value="Chiều">Chiều</option>
            </select>
        </div>

        <div id="lateGroup" class="dynamic-field">
            <label>Giờ đến / Giờ về</label>
            <input type="time" id="specificTime">
            <label>Thời gian làm bù</label>
            <input type="text" id="makeupTime" placeholder="Ví dụ: Làm bù sáng T7">
        </div>

        <label>Ghi chú (Note)</label>
        <textarea id="note" rows="2" placeholder="Lý do chi tiết..."></textarea>

        <button type="submit" id="submitBtn">Gửi Yêu Cầu</button>
    </form>
</div>

<div class="form-container status-box">
    <h2>Tra Cứu Kết Quả</h2>
    <label>Chọn tên của bạn</label>
    <select id="checkName">
        <option value="">-- Chọn tên --</option>
        <option>Đào Trang</option><option>Trần Trang</option><option>Anh Dũng</option>
        <option>Huy Đạt</option><option>Thảo Nguyên</option><option>Ngọc Vân</option>
        <option>Thùy Chi</option><option>Anh Thư</option><option>Huyền Trang</option>
        <option>Đức Duy</option><option>Roze Ngọc</option><option>Thúy Quỳnh</option>
        <option>Thu Vân</option><option>Thanh Tâm</option>
    </select>
    <button onclick="checkStatus()">Kiểm tra trạng thái</button>
    <div id="statusResult">---</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQhzffWizSsyZQN2nOZfRmhFbWYEvB6Hjl40vTswEkNkCxvUtlpE78p-q7LcI2WTPs/exec';

    function toggleFields() {
        const type = document.getElementById('requestType').value;
        const dl = document.getElementById('dateLabel');
        document.getElementById('sessionGroup').classList.remove('active');
        document.getElementById('lateGroup').classList.remove('active');
        document.getElementById('endDateGroup').classList.remove('active');
        dl.innerText = "Ngày áp dụng";

        if (type.includes("1 ngày") || type.includes("online")) document.getElementById('sessionGroup').classList.add('active');
        else if (type.includes("muộn") || type.includes("sớm")) document.getElementById('lateGroup').classList.add('active');
        else if (type.includes("nhiều ngày")) {
            document.getElementById('endDateGroup').classList.add('active');
            dl.innerText = "Từ ngày";
        }
    }

    // HÀM TRA CỨU TRẠNG THÁI
    function checkStatus() {
        const name = document.getElementById('checkName').value;
        if (!name) return alert("Vui lòng chọn tên!");
        
        const resultDiv = document.getElementById('statusResult');
        resultDiv.innerText = "Đang kiểm tra...";

        fetch(scriptURL + "?action=checkStatus&name=" + encodeURIComponent(name))
        .then(res => res.text())
        .then(data => { resultDiv.innerText = data; })
        .catch(err => { resultDiv.innerText = "Lỗi kết nối!"; });
    }

    document.getElementById('hrForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = 'Đang gửi...';

        const type = document.getElementById('requestType').value;
        let details = "";
        let finalDate = document.getElementById('date').value;

        if (type.includes("nhiều ngày")) finalDate += " đến " + document.getElementById('endDate').value;
        if (type.includes("1 ngày") || type.includes("online")) details = "Buổi: " + document.getElementById('sessionOption').value;
        else if (type.includes("muộn") || type.includes("sớm")) details = "Giờ: " + document.getElementById('specificTime').value + " | Bù: " + document.getElementById('makeupTime').value;

        const data = {
            fullName: document.getElementById('fullName').value,
            requestType: type,
            date: finalDate,
            details: details,
            note: document.getElementById('note').value || "Không có"
        };

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
        .then(res => { alert('✅ Thành công!'); document.getElementById('hrForm').reset(); toggleFields(); })
        .catch(err => alert('❌ Lỗi!'))
        .finally(() => { btn.disabled = false; btn.innerText = 'Gửi Yêu Cầu'; });
    });
</script>
</body>
</html>
