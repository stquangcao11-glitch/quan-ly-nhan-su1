<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhân Sự Seentech</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background: #1a73e8; color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .dynamic-field { display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .dynamic-field.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Yêu Cầu Nhân Sự</h2>
    <form id="hrForm">
        <div class="form-group">
            <label>Họ và Tên</label>
            <select id="fullName" required>
                <option value="">-- Chọn tên của bạn --</option>
                <option>Đào Trang</option><option>Trần Trang</option><option>Anh Dũng</option>
                <option>Huy Đạt</option><option>Thảo Nguyên</option><option>Ngọc Vân</option>
                <option>Thùy Chi</option><option>Anh Thư</option><option>Huyền Trang</option>
                <option>Đức Duy</option><option>Roze Ngọc</option><option>Thúy Quỳnh</option>
                <option>Thu Vân</option><option>Thanh Tâm</option>
            </select>
        </div>

        <div class="form-group">
            <label>Loại yêu cầu</label>
            <select id="requestType" required onchange="toggleFields()">
                <option value="">-- Chọn loại yêu cầu --</option>
                <option value="Xin nghỉ phép (1 ngày)">Xin nghỉ phép (1 ngày)</option>
                <option value="Xin nghỉ phép (nhiều ngày)">Xin nghỉ phép (nhiều ngày)</option>
                <option value="Xin đi muộn">Xin đi muộn</option>
                <option value="Xin về sớm">Xin về sớm</option>
                <option value="Xin làm online">Xin làm online (Remote)</option>
            </select>
        </div>

        <div class="form-group">
            <label id="dateLabel">Ngày áp dụng</label>
            <input type="date" id="date" required>
        </div>

        <div id="endDateGroup" class="dynamic-field">
            <div class="form-group">
                <label>Đến ngày</label>
                <input type="date" id="endDate">
            </div>
        </div>

        <div id="sessionGroup" class="dynamic-field">
            <div class="form-group">
                <label>Thời gian áp dụng</label>
                <select id="sessionOption">
                    <option value="Cả ngày">Cả ngày</option>
                    <option value="Sáng">Sáng</option>
                    <option value="Chiều">Chiều</option>
                </select>
            </div>
        </div>

        <div id="lateGroup" class="dynamic-field">
            <div class="form-group">
                <label>Thời gian đến công ty</label>
                <input type="time" id="arrivalTime">
            </div>
            <div class="form-group">
                <label>Thời gian đăng ký làm bù</label>
                <input type="text" id="lateMakeupTime" placeholder="Ví dụ: Làm thêm 1 tiếng chiều mai...">
            </div>
        </div>

        <div id="earlyGroup" class="dynamic-field">
            <div class="form-group">
                <label>Thời gian xin về</label>
                <input type="time" id="leaveTime">
            </div>
            <div class="form-group">
                <label>Thời gian đăng ký làm bù</label>
                <input type="text" id="earlyMakeupTime" placeholder="Ví dụ: Làm bù sáng thứ 7...">
            </div>
        </div>

        <div class="form-group">
            <label>Ghi chú (Note)</label>
            <textarea id="note" rows="3" placeholder="Nhập lý do hoặc chi tiết nghỉ..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Gửi Yêu Cầu</button>
    </form>
</div>

<script>
    function toggleFields() {
        const type = document.getElementById('requestType').value;
        const dateLabel = document.getElementById('dateLabel');
        
        // Ẩn tất cả các trường phụ
        document.getElementById('sessionGroup').classList.remove('active');
        document.getElementById('lateGroup').classList.remove('active');
        document.getElementById('earlyGroup').classList.remove('active');
        document.getElementById('endDateGroup').classList.remove('active');
        
        // Trả lại tên mặc định cho ô Ngày
        dateLabel.innerText = "Ngày áp dụng";

        if (type === "Xin nghỉ phép (1 ngày)" || type === "Xin làm online") {
            document.getElementById('sessionGroup').classList.add('active');
        } else if (type === "Xin đi muộn") {
            document.getElementById('lateGroup').classList.add('active');
        } else if (type === "Xin về sớm") {
            document.getElementById('earlyGroup').classList.add('active');
        } else if (type === "Xin nghỉ phép (nhiều ngày)") {
            document.getElementById('endDateGroup').classList.add('active');
            dateLabel.innerText = "Từ ngày"; // Tự động đổi tên nhãn
        }
    }

    document.getElementById('hrForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // --- QUAN TRỌNG: DÁN LINK WEB APP CỦA BẠN VÀO DƯỚI ĐÂY ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxC58bg591-6DobU_gCtFzNJbmAhUKny0Yfq-04vPAC_UVvJR0EK2iNwrQehbcRh_Y6jg/exec';
        
        const type = document.getElementById('requestType').value;
        let detailsText = "";
        let finalDate = document.getElementById('date').value;

        // Xử lý ghép ngày nếu là nghỉ nhiều ngày
        if (type === "Xin nghỉ phép (nhiều ngày)") {
            const endDateVal = document.getElementById('endDate').value;
            if(endDateVal) {
                finalDate = finalDate + " đến " + endDateVal;
            }
            detailsText = "Nghỉ nhiều ngày";
        } else if (type === "Xin nghỉ phép (1 ngày)" || type === "Xin làm online") {
            detailsText = "Buổi: " + document.getElementById('sessionOption').value;
        } else if (type === "Xin đi muộn") {
            const arrTime = document.getElementById('arrivalTime').value || "Chưa nhập";
            const mkTime = document.getElementById('lateMakeupTime').value || "Chưa nhập";
            detailsText = "Đến lúc: " + arrTime + " | Làm bù: " + mkTime;
        } else if (type === "Xin về sớm") {
            const lvTime = document.getElementById('leaveTime').value || "Chưa nhập";
            const mkTime = document.getElementById('earlyMakeupTime').value || "Chưa nhập";
            detailsText = "Về lúc: " + lvTime + " | Làm bù: " + mkTime;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Đang gửi...';

        const data = {
            fullName: document.getElementById('fullName').value,
            requestType: type,
            date: finalDate, // Sử dụng ngày đã được ghép
            details: detailsText,
            note: document.getElementById('note').value || "Không có"
        };

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
        .then(res => {
            alert('✅ Đã gửi yêu cầu thành công!');
            document.getElementById('hrForm').reset();
            toggleFields(); 
        })
        .catch(err => alert('❌ Lỗi kết nối. Hãy kiểm tra lại link Script.'))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = 'Gửi Yêu Cầu';
        });
    });
</script>

</body>
</html>
