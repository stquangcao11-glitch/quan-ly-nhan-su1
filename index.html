<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhân Sự Seentech</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background: #1a73e8; color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .dynamic-field { display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .dynamic-field.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .row-flex { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-flex div { flex: 1; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Yêu Cầu Nhân Sự</h2>
    <form id="hrForm">
        <div class="form-group">
            <label>Họ và Tên</label>
            <select id="fullName" required>
                <option value="">-- Chọn tên của bạn --</option>
                <option>Đào Trang</option><option>Trần Trang</option><option>Anh Dũng</option>
                <option>Huy Đạt</option><option>Thảo Nguyên</option><option>Ngọc Vân</option>
                <option>Thùy Chi</option><option>Anh Thư</option><option>Huyền Trang</option>
                <option>Đức Duy</option><option>Roze Ngọc</option><option>Thúy Quỳnh</option>
                <option>Thu Vân</option>
            </select>
        </div>

        <div class="form-group">
            <label>Loại yêu cầu</label>
            <select id="requestType" required onchange="toggleFields()">
                <option value="">-- Chọn loại yêu cầu --</option>
                <option value="Xin nghỉ phép">Xin nghỉ phép</option>
                <option value="Xin đi muộn">Xin đi muộn</option>
                <option value="Xin về sớm">Xin về sớm</option>
                <option value="Xin làm online">Xin làm online (Remote)</option>
            </select>
        </div>

        <div id="singleDateGroup" class="form-group">
            <label>Ngày áp dụng</label>
            <input type="date" id="singleDate">
        </div>

        <div id="leaveDateGroup" class="dynamic-field">
            <div class="row-flex">
                <div>
                    <label>Từ ngày</label>
                    <input type="date" id="startDate">
                </div>
                <div>
                    <label>Buổi bắt đầu</label>
                    <select id="startSession">
                        <option>Cả ngày</option><option>Sáng</option><option>Chiều</option>
                    </select>
                </div>
            </div>
            <div class="row-flex">
                <div>
                    <label>Đến ngày</label>
                    <input type="date" id="endDate">
                </div>
                <div>
                    <label>Buổi kết thúc</label>
                    <select id="endSession">
                        <option>Cả ngày</option><option>Sáng</option><option>Chiều</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="onlineGroup" class="dynamic-field">
            <label>Buổi làm online</label>
            <select id="onlineSession">
                <option>Cả ngày</option><option>Sáng</option><option>Chiều</option>
            </select>
        </div>

        <div id="lateGroup" class="dynamic-field">
            <label>Thời gian đến công ty</label>
            <input type="time" id="arrivalTime" class="form-group">
            <label>Thời gian đăng ký làm bù</label>
            <input type="text" id="lateMakeup" placeholder="Ví dụ: Làm bù 1 tiếng chiều nay...">
        </div>

        <div id="earlyGroup" class="dynamic-field">
            <label>Thời gian xin về</label>
            <input type="time" id="leaveTime" class="form-group">
            <label>Thời gian đăng ký làm bù</label>
            <input type="text" id="earlyMakeup" placeholder="Ví dụ: Làm bù sáng thứ 7...">
        </div>

        <div class="form-group">
            <label>Ghi chú (Note)</label>
            <textarea id="note" rows="2" placeholder="Ghi chú thêm nếu có..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Gửi Yêu Cầu</button>
    </form>
</div>

<script>
    function toggleFields() {
        const type = document.getElementById('requestType').value;
        const dynamics = ['leaveDateGroup', 'onlineGroup', 'lateGroup', 'earlyGroup'];
        dynamics.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('singleDateGroup').style.display = 'block';

        if (type === "Xin nghỉ phép") {
            document.getElementById('leaveDateGroup').classList.add('active');
            document.getElementById('singleDateGroup').style.display = 'none';
        } else if (type === "Xin làm online") {
            document.getElementById('onlineGroup').classList.add('active');
        } else if (type === "Xin đi muộn") {
            document.getElementById('lateGroup').classList.add('active');
        } else if (type === "Xin về sớm") {
            document.getElementById('earlyGroup').classList.add('active');
        }
    }

    document.getElementById('hrForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz72lPQlBL8dEBVekNfjVfXVrRqqKUrTmmAnCACmRoojviISt6zwocTVfl__hkkVeiODw/exec';
        const type = document.getElementById('requestType').value;
        
        let startD = document.getElementById('singleDate').value;
        let endD = document.getElementById('singleDate').value;
        let startS = "Cả ngày";
        let endS = "Cả ngày";
        let details = "";

        if (type === "Xin nghỉ phép") {
            startD = document.getElementById('startDate').value;
            startS = document.getElementById('startSession').value;
            endD = document.getElementById('endDate').value;
            endS = document.getElementById('endSession').value;
            details = "Nghỉ phép dài ngày";
        } else if (type === "Xin làm online") {
            startS = document.getElementById('onlineSession').value;
            endS = startS;
            details = "Làm việc từ xa";
        } else if (type === "Xin đi muộn") {
            details = "Giờ đến: " + document.getElementById('arrivalTime').value + " | Bù: " + document.getElementById('lateMakeup').value;
        } else if (type === "Xin về sớm") {
            details = "Giờ về: " + document.getElementById('leaveTime').value + " | Bù: " + document.getElementById('earlyMakeup').value;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Đang gửi...';

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({
                fullName: document.getElementById('fullName').value,
                requestType: type,
                startDate: startD,
                startSession: startS,
                endDate: endD,
                endSession: endS,
                details: details,
                note: document.getElementById('note').value || "Không có"
            })
        })
        .then(res => {
            alert('✅ Gửi yêu cầu thành công!');
            document.getElementById('hrForm').reset();
            toggleFields();
        })
        .catch(err => alert('❌ Lỗi kết nối.'))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = 'Gửi Yêu Cầu';
        });
    });
</script>
</body>
</html>
